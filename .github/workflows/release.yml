name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

# Actions are pinned: first-party actions to immutable release tags, third-party
# actions to commit SHAs. Bump them with Dependabot's `github-actions` ecosystem.
jobs:
  guard:
    name: Guard tag matches version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Check tag matches Cargo.toml version
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          # Guard: the pushed tag must match the Cargo.toml version, otherwise
          # `cargo publish` would ship a different version than the tag implies.
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $version"
            exit 1
          fi

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock', '**/*.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Check
        run: nix develop --command just check

  publish:
    name: Publish to crates.io
    needs: [check, guard]
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable channel pinned below
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2.9.1

      # `--locked` keeps the published build reproducible; requires a committed Cargo.lock.
      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
